apiVersion: apps/v1
kind: ReplicaSet
metadata:
  name: redis-slave
  labels:
    app: redis
    role: slave
    tier: backend
spec:
  # this replicas value is default
  # modify it according to your case
  replicas: 2
  selector:
    matchLabels:
      app: redis
      role: slave
      tier: backend
  template:
    metadata:
      labels:
        app: redis
        role: slave
        tier: backend
    spec:
      containers:
      - name: slave
        image: registry.k8s.io/e2e-test-images/agnhost:2.63
        command: ["/agnhost", "pause"]
        resources:
          requests:
            cpu: 100m
            memory: 100Mi
