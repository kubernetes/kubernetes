apiVersion: v1
kind: Pod
metadata:
  name: ulimits1
spec:
  containers:
  - image: registry.k8s.io/pause
    name: container1
    securityContext:
      allowPrivilegeEscalation: false
  initContainers:
  - image: registry.k8s.io/pause
    name: initcontainer1
    securityContext:
      allowPrivilegeEscalation: false
      ulimits:
      - hard: 1
        name: core
        soft: 1
  securityContext:
    runAsNonRoot: true
    seccompProfile:
      type: RuntimeDefault
