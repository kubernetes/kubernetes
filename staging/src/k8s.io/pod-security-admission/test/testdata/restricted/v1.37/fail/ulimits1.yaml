apiVersion: v1
kind: Pod
metadata:
  name: ulimits1
spec:
  containers:
  - image: registry.k8s.io/pause
    name: container1
    securityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop:
        - ALL
  initContainers:
  - image: registry.k8s.io/pause
    name: initcontainer1
    securityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop:
        - ALL
      ulimits:
        core:
          hard: 1
          soft: 1
  securityContext:
    runAsNonRoot: true
    seccompProfile:
      type: RuntimeDefault
