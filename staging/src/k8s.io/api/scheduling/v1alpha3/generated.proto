  // +listMapKey=name
  // +k8s:optional
  // +k8s:listType=map
  // +k8s:listMapKey=name
  // +k8s:maxItems=4
  // +featureGate=DRAWorkloadResourceClaims
  repeated PodGroupResourceClaim resourceClaims = 4;

  // DisruptionMode defines the mode in which a given PodGroup can be disrupted.
  // One of Single, All.
