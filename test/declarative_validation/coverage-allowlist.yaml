# Suppressions for declarative-validation coverage.
#
# Every field is required. apiVersion matches exactly (use the standard
# "<group>/<version>" form, or "<version>" for core). kind, path,
# errorType, and origin match exactly OR wildcard with '*' (no implicit
# wildcarding, so an entry can never silently overexclude). reason is
# required.
#
# Example:
#   - apiVersion: autoscaling/v1   # one specific rule
#     kind: Scale
#     path: spec.replicas
#     errorType: FieldValueInvalid
#     origin: minimum
#     reason: tested separately
#
# Run hack/update-codegen.sh after editing.

- apiVersion: extensions/v1beta1
  kind: '*'
  path: '*'
  errorType: '*'
  origin: '*'
  reason: Not served by kube-apiserver.

# The discriminated-union check on ConditionsAwareDecision emits errors at
# child member paths (e.g. status.conditionalDecision.deny) rather than at the
# struct itself (status.conditionalDecision), so the declared rule at the
# parent path is unreachable at runtime. See k8s.io/apimachinery/pkg/api/validate.DiscriminatedUnion.
- apiVersion: authorization.k8s.io/v1
  kind: SubjectAccessReview
  path: status.conditionalDecision
  errorType: FieldValueInvalid
  origin: union
  reason: DiscriminatedUnion emits errors at child paths, not the parent struct path.
- apiVersion: authorization.k8s.io/v1
  kind: SelfSubjectAccessReview
  path: status.conditionalDecision
  errorType: FieldValueInvalid
  origin: union
  reason: DiscriminatedUnion emits errors at child paths, not the parent struct path.
- apiVersion: authorization.k8s.io/v1
  kind: LocalSubjectAccessReview
  path: status.conditionalDecision
  errorType: FieldValueInvalid
  origin: union
  reason: DiscriminatedUnion emits errors at child paths, not the parent struct path.
- apiVersion: authorization.k8s.io/v1alpha1
  kind: AuthorizationConditionsReview
  path: request.decision
  errorType: FieldValueInvalid
  origin: union
  reason: DiscriminatedUnion emits errors at child paths, not the parent struct path.
- apiVersion: authorization.k8s.io/v1alpha1
  kind: AuthorizationConditionsReview
  path: response.decision
  errorType: FieldValueInvalid
  origin: union
  reason: DiscriminatedUnion emits errors at child paths, not the parent struct path.
