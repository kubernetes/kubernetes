# The following labels are used in this file:
#
# - integration-test: test cases to run as the integration test.
# - performance: test cases to run in the performance test.
# - short: supplemental label for the above two labels (must not used alone), which literally means short execution time test cases.

- name: TopologyAwareScheduling
  featureGates:
    GenericWorkload: true
    TopologyAwareWorkloadScheduling: true
  workloadTemplate:
  - opcode: createNodes
    countParam: $initNodes
    nodeTemplatePath: templates/node.yaml
  - opcode: createNamespaces
    prefix: tas-ns
    count: 1
  - opcode: createPodGroups
    # Create pod groups, and wait for the scheduler's informer cache to reflect the newly created pod group objects.
    # Each pod group is named gang-0, gang-1, ..., gang-(n-1), where n is the number of pod groups.
    # Each group has gang policy, min count, and topology constraints specified in the pod group template.
    countParam: $initPodGroups
    namespace: tas-ns-0
    templatePath: templates/podgroup.yaml
    templateParams:
      podsPerGroup: $podsPerGroup
  - opcode: createPods
    # Create pods with reference to the pod groups (gangs) according to their indices (e.g., pods 0-2 → gang-0, pods 3-5 → gang-1, etc.).
    countParam: $initPodGroups
    countMultiplierParam: $podsPerGroup
    namespace: tas-ns-0
    podTemplatePath: templates/gang-pod.yaml
    collectMetrics: true
    templateParams:
      podsPerGroup: $podsPerGroup
  workloads:
  - name: 10Nodes_3Gangs
    labels: [integration-test, short]
    params:
      initNodes: 10
      initPodGroups: 3
      podsPerGroup: 3
  - name: 100Nodes_10Gangs
    labels: [integration-test]
    params:
      initNodes: 100
      initPodGroups: 10
      podsPerGroup: 3
  - name: 5000Nodes_750Gangs_3000Pods
    labels: [performance]
    params:
      initNodes: 5000
      initPodGroups: 750
      podsPerGroup: 4
  - name: 5000Nodes_1500Gangs_6000Pods
    labels: [performance]
    params:
      initNodes: 5000
      initPodGroups: 1500
      podsPerGroup: 4
  - name: 5000Nodes_2250Gangs_9000Pods
    labels: [performance]
    params:
      initNodes: 5000
      initPodGroups: 2250
      podsPerGroup: 4
  - name: 5000Nodes_3Gangs_3000Pods_1000PerGroup
    labels: [performance]
    params:
      initNodes: 5000
      initPodGroups: 3
      podsPerGroup: 1000
  - name: 5000Nodes_6Gangs_6000Pods_1000PerGroup
    labels: [performance]
    params:
      initNodes: 5000
      initPodGroups: 6
      podsPerGroup: 1000
  - name: 5000Nodes_9Gangs_9000Pods_1000PerGroup
    labels: [performance]
    params:
      initNodes: 5000
      initPodGroups: 9
      podsPerGroup: 1000


