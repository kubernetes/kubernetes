# The following labels are used in this file. (listed in ascending order of the number of covered test cases)
#
# - integration-test: test cases to run as the integration test, usually to spot some issues in the scheduler implementation or scheduler-perf itself.
# - performance: test cases to run in the performance test.
# - short: supplemental label for the above two labels (must not used alone), which literally means short execution time test cases.
#
# Specifically, the CIs use labels like the following:
# - `ci-kubernetes-integration-master` (`integration-test`): Test cases are chosen based on a tradeoff between code coverage and overall runtime. 
# It basically covers all test cases but with their smallest workload. 
# - `pull-kubernetes-integration` (`integration-test`,`short`): Test cases are chosen so that they should take less than total 5 min to complete.
# - `ci-benchmark-scheduler-perf` (`performance`): Long enough test cases are chosen (ideally, longer than 10 seconds) 
# to provide meaningful samples for the pod scheduling rate.
#
# Also, `performance`+`short` isn't used in the CIs, but it's used to test the performance test locally.
# (Sometimes, the test cases with `integration-test` are too small to spot issues.)
#
# Combining `performance` and `short` selects suitable workloads for a local
# before/after comparisons with benchstat.

# ExtendedResource uses pods with extended resources requests.
#
# Class "example.com/gpu" selects one of potentially many
# (classes parameter) device classes explicitly.
# "deviceclass.resource.kubernetes.io/test-class" uses the implicit
# device class instead.
- name: ExtendedResource
  featureGates:
    DynamicResourceAllocation: true
    DRAExtendedResource: true
  workloadTemplate:
  - opcode: createNodes
    countParam: $nodesWithoutDRA
  - opcode: createNodes
    nodeTemplatePath: ../templates/node-with-dra-test-driver.yaml
    countParam: $nodesWithDRA
  - opcode: createAny
    # one ResourceSlice with 10 devices
    templatePath: ../templates/resourceslice-basic-devices.yaml
    countParam: $nodesWithDRA
    templateParams:
      numDevices: 10
  - opcode: createAny
    templatePath: ../templates/deviceclass-extended-resource.yaml
    countParam: $classes
    templateParams:
      class: $class
  - opcode: createPods
    namespace: init
    countParam: $initPods
    podTemplatePath: ../templates/pod-with-extended-resource.yaml
    templateParams:
      class: $class
      classes: $classes
  - opcode: createPods
    namespace: test
    countParam: $measurePods
    podTemplatePath: ../templates/pod-with-extended-resource.yaml
    templateParams:
      class: $class
      classes: $classes
    collectMetrics: true
  workloads:
  - name: fast
    featureGates:
      DRAExtendedResource: true
    labels: [integration-test, short]
    params:
      # This testcase runs through all code paths without
      # taking too long overall.
      class: example.com/gpu
      classes: 10
      nodesWithDRA: 1
      nodesWithoutDRA: 1
      initPods: 0
      measurePods: 10
  - name: Explicit_25classes_2000pods_200nodes
    params:
      class: example.com/gpu
      classes: 25
      nodesWithDRA: 200
      nodesWithoutDRA: 0
      initPods: 1000
      measurePods: 1000
  - name: Explicit_25classes_5000pods_500nodes
    labels: [performance]
    threshold: 120
    params:
      class: example.com/gpu
      classes: 25
      nodesWithDRA: 500
      nodesWithoutDRA: 0
      initPods: 2500
      measurePods: 2500
  - name: Explicit_50classes_2000pods_200nodes
    params:
      class: example.com/gpu
      classes: 50
      nodesWithDRA: 200
      nodesWithoutDRA: 0
      initPods: 1000
      measurePods: 1000
  - name: Explicit_50classes_5000pods_500nodes
    labels: [performance]
    threshold: 130
    params:
      class: example.com/gpu
      classes: 50
      nodesWithDRA: 500
      nodesWithoutDRA: 0
      initPods: 2500
      measurePods: 2500
  - name: Implicit_25classes_2000pods_200nodes
    params:
      class: deviceclass.resource.kubernetes.io/test-class
      classes: 25
      nodesWithDRA: 200
      nodesWithoutDRA: 0
      initPods: 1000
      measurePods: 1000
  - name: Implicit_25classes_5000pods_500nodes
    labels: [performance]
    threshold: 130
    params:
      class: deviceclass.resource.kubernetes.io/test-class
      classes: 25
      nodesWithDRA: 500
      nodesWithoutDRA: 0
      initPods: 2500
      measurePods: 2500
