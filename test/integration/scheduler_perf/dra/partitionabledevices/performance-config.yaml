# The following labels are used in this file. (listed in ascending order of the number of covered test cases)
#
# - integration-test: test cases to run as the integration test, usually to spot some issues in the scheduler implementation or scheduler-perf itself.
# - performance: test cases to run in the performance test.
# - short: supplemental label for the above two labels (must not used alone), which literally means short execution time test cases.
#
# Specifically, the CIs use labels like the following:
# - `ci-kubernetes-integration-master` (`integration-test`): Test cases are chosen based on a tradeoff between code coverage and overall runtime. 
# It basically covers all test cases but with their smallest workload. 
# - `pull-kubernetes-integration` (`integration-test`,`short`): Test cases are chosen so that they should take less than total 5 min to complete.
# - `ci-benchmark-scheduler-perf` (`performance`): Long enough test cases are chosen (ideally, longer than 10 seconds) 
# to provide meaningful samples for the pod scheduling rate.
#
# Also, `performance`+`short` isn't used in the CIs, but it's used to test the performance test locally.
# (Sometimes, the test cases with `integration-test` are too small to spot issues.)
#
# Combining `performance` and `short` selects suitable workloads for a local
# before/after comparisons with benchstat.

# Partitionable is a variant of SchedulingWithResourceClaimTemplate.
# For each node, it creates two ResourceSlices: one providing a shared counter
# set (counter1..4, capacity 1 each), and another providing partitionable
# devices (two 2-counter devices) that consume from those shared counters. Each
# allocation requests two devices. Since each node has only one device slice,
# the allocator matches both devices (device-1 and device-2) without
# counter conflicts or backtracking. This means one pod or claim fits onto one node.
- name: Partitionable
  featureGates:
    DynamicResourceAllocation: true
    DRAPartitionableDevices: true
  workloadTemplate:
  - opcode: createNodes
    countParam: $nodesWithoutDRA
  - opcode: createNodes
    nodeTemplatePath: ../templates/node-with-dra-test-driver.yaml
    countParam: $nodesWithDRA
  - opcode: createAny
    templatePath: ../templates/resourceslice-partitionable-countersets.yaml
    countParam: $nodesWithDRA
  - opcode: createAny
    templatePath: ../templates/resourceslice-partitionable-devices.yaml
    countParam: $nodesWithDRA
  - opcode: createAny
    templatePath: ../templates/deviceclass.yaml
  - opcode: createAny
    templatePath: ../templates/resourceclaim-partitionable.yaml
    namespace: init
    countParam: $initClaims
  - opcode: allocResourceClaims
    namespace: init
  - opcode: createAny
    templatePath: ../templates/resourceclaimtemplate-for-two-devices.yaml
    namespace: test
  - opcode: createPods
    namespace: test
    countParam: $measurePods
    steadyStateParam: $steadyState
    durationParam: $duration
    podTemplatePath: ../templates/pod-with-claim-template.yaml
    collectMetrics: true
  workloads:
  - name: fast
    labels: [integration-test, short]
    params:
      # This testcase runs through all code paths without
      # taking too long overall.
      nodesWithDRA: 1
      nodesWithoutDRA: 1
      initClaims: 0
      measurePods: 1
      steadyState: false
      duration: 0s # unused
  - name: empty_100nodes
    params:
      nodesWithDRA: 100
      nodesWithoutDRA: 0
      initClaims: 0
      measurePods: 10
      steadyState: true
      duration: 10s
  - name: half_100nodes
    params:
      nodesWithDRA: 100
      nodesWithoutDRA: 0
      initClaims: 50 # 50 nodes * 1 claim/node
      measurePods: 10
      steadyState: true
      duration: 10s
  - name: empty_500nodes
    labels: [performance]
    params:
      nodesWithDRA: 500
      nodesWithoutDRA: 0
      initClaims: 0
      measurePods: 10
      steadyState: true
      duration: 10s
  - name: half_500nodes
    labels: [performance]
    params:
      nodesWithDRA: 500
      nodesWithoutDRA: 0
      initClaims: 250 # 250 nodes * 1 claim/node
      measurePods: 10
      steadyState: true
      duration: 10s
  - name: full_500nodes
    labels: [performance]
    params:
      nodesWithDRA: 500
      nodesWithoutDRA: 0
      initClaims: 490 # 500 nodes * 1 claim/node - 10 pods
      measurePods: 10
      steadyState: true
      duration: 10s
  - name: empty_1000nodes
    labels: [performance]
    params:
      nodesWithDRA: 1000
      nodesWithoutDRA: 0
      initClaims: 0
      measurePods: 10
      steadyState: true
      duration: 10s
  - name: half_1000nodes
    labels: [performance]
    params:
      nodesWithDRA: 1000
      nodesWithoutDRA: 0
      initClaims: 500 # 500 nodes * 1 claim/node
      measurePods: 10
      steadyState: true
      duration: 10s
  - name: full_1000nodes
    labels: [performance]
    params:
      nodesWithDRA: 1000
      nodesWithoutDRA: 0
      initClaims: 990 # 1000 nodes * 1 claim/node - 10 pods
      measurePods: 10
      steadyState: true
      duration: 10s

# PartitionableBacktracking is a variant of SchedulingWithResourceClaimTemplate.
# For each slice, it creates shared counter sets for CPU (cpu1..8, capacity 1
# each) and memory (mem, capacity 70Gi), and eight devices. Device 1 consumes
# 20Gi memory; devices 2..8 consume 10Gi each. Each allocation requests 7
# devices. Including device 1 requires 20Gi + (6 * 10Gi) = 80Gi, exceeding
# memory capacity. The only working combination is devices 2..8 (70Gi).
# Attempting combinations with device 1 forces the allocator into repeated
# backtracking. This means one pod or claim fits onto one node.
- name: PartitionableBacktracking
  featureGates:
    DynamicResourceAllocation: true
    DRAPartitionableDevices: true
  workloadTemplate:
  - opcode: createNodes
    countParam: $nodesWithoutDRA
  - opcode: createNodes
    nodeTemplatePath: ../templates/node-with-dra-test-driver.yaml
    countParam: $nodesWithDRA
  - opcode: createAny
    templatePath: ../templates/resourceslice-partitionable-backtracking-countersets.yaml
    countParam: $nodesWithDRA
  - opcode: createAny
    templatePath: ../templates/resourceslice-partitionable-backtracking-devices.yaml
    countParam: $nodesWithDRA
  - opcode: createAny
    templatePath: ../templates/deviceclass.yaml
  - opcode: createAny
    templatePath: ../templates/resourceclaim-partitionable-backtracking.yaml
    namespace: init
    countParam: $initClaims
  - opcode: allocResourceClaims
    namespace: init
  - opcode: createAny
    templatePath: ../templates/resourceclaimtemplate-backtracking.yaml
    namespace: test
  - opcode: createPods
    namespace: test
    countParam: $measurePods
    steadyStateParam: $steadyState
    durationParam: $duration
    podTemplatePath: ../templates/pod-with-claim-template.yaml
    collectMetrics: true
  workloads:
  - name: fast
    labels: [integration-test, short]
    params:
      # This testcase runs through all code paths without
      # taking too long overall.
      nodesWithDRA: 1
      nodesWithoutDRA: 1
      initClaims: 0
      measurePods: 1
      steadyState: false
      duration: 0s # unused
  - name: empty_100nodes
    params:
      nodesWithDRA: 100
      nodesWithoutDRA: 0
      initClaims: 0
      measurePods: 10
      steadyState: true
      duration: 10s
  - name: half_100nodes
    params:
      nodesWithDRA: 100
      nodesWithoutDRA: 0
      initClaims: 50 # 50 nodes * 1 claim/node
      measurePods: 10
      steadyState: true
      duration: 10s
  - name: empty_500nodes
    labels: [performance]
    params:
      nodesWithDRA: 500
      nodesWithoutDRA: 0
      initClaims: 0
      measurePods: 10
      steadyState: true
      duration: 10s
  - name: half_500nodes
    labels: [performance]
    params:
      nodesWithDRA: 500
      nodesWithoutDRA: 0
      initClaims: 250 # 250 nodes * 1 claim/node
      measurePods: 10
      steadyState: true
      duration: 10s
  - name: full_500nodes
    labels: [performance]
    params:
      nodesWithDRA: 500
      nodesWithoutDRA: 0
      initClaims: 490 # 500 nodes * 1 claim/node - 10 pods
      measurePods: 10
      steadyState: true
      duration: 10s
  - name: empty_1000nodes
    labels: [performance]
    params:
      nodesWithDRA: 1000
      nodesWithoutDRA: 0
      initClaims: 0
      measurePods: 10
      steadyState: true
      duration: 10s
  - name: half_1000nodes
    labels: [performance]
    params:
      nodesWithDRA: 1000
      nodesWithoutDRA: 0
      initClaims: 500 # 500 nodes * 1 claim/node
      measurePods: 10
      steadyState: true
      duration: 10s
  - name: full_1000nodes
    labels: [performance]
    params:
      nodesWithDRA: 1000
