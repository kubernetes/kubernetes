kind: ResourceSlice
apiVersion: resource.k8s.io/v1
metadata:
  name: resourceslice-devices-{{.Index}}
spec:
  pool:
    name: resourceslice-{{.Index}}
    generation: 1
    resourceSliceCount: 2
  driver: test-driver.cdi.k8s.io
  nodeName: scheduler-perf-dra-{{.Index}}
  devices:
  - name: device-1
    consumesCounters:
    - counterSet: counter-set
      counters:
        counter1:
          value: "1"
        counter2:
          value: "1"
  - name: device-2
    consumesCounters:
    - counterSet: counter-set
      counters:
        counter3:
          value: "1"
        counter4:
          value: "1"
