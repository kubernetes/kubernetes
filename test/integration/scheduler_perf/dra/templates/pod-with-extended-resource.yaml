# Pod template for extended resource tests.
# Pods cycle through .classes device classes (example.com/gpu-0 through example.com/gpu-24 for .classes == 25).
# The class can be explicit or implicit depending on .class.
# When .classes is 1, all requests use the same class because "X modulo 1" is always zero.
apiVersion: v1
kind: Pod
metadata:
  name: test-dra-{{.Index}}
spec:
  containers:
  - image: registry.k8s.io/pause:3.9
    name: pause
    resources:
      requests:
        {{.class}}-{{Mod .Index .classes}}: 1
      limits:
        {{.class}}-{{Mod .Index .classes}}: 1
