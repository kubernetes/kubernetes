{{$numRequests := (or .numRequests 1) | Int}}
{{$selectors := (or .selectors nil) | JSON}}
{{$constraints := (or .constraints nil) | JSON}}

apiVersion: resource.k8s.io/v1
kind: ResourceClaimTemplate
metadata:
  name: test-claim-template
spec:
  spec:
    devices:
      constraints: {{$constraints}}
      requests:{{range $numRequests}}
      - name: req-{{.}}
        exactly:
          deviceClassName: test-class
          selectors: {{$selectors}}{{end}}
