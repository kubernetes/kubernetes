apiVersion: v1
kind: Pod
metadata:
  name: pod-gang-{{.Index}}
spec:
  schedulingGroup:
    podGroupName: gang-{{DivideInt .Index .podsPerGroup}}
  terminationGracePeriodSeconds: 0
  containers:
  - image: registry.k8s.io/pause:3.10.1
    name: pause
    {{if .hostPortBase}}
    ports:
    - containerPort: 80
      hostPort: {{AddInt .hostPortBase (DivideInt .Index .podsPerGroup)}}
    {{end}}
    resources:
      limits:
        cpu: {{.cpuRequest}}
        memory: 100Mi
      requests:
        cpu: {{.cpuRequest}}
        memory: 100Mi
