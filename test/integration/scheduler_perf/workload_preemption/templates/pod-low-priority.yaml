apiVersion: v1
kind: Pod
metadata:
  generateName: pod-low-priority-{{.Index}}-
  labels:
    app: blue
    label1: value1
    label2: value2
    label3: value3
    label4: value4
spec:
  priority: {{.Index}}
  terminationGracePeriodSeconds: 0
  containers:
  - image: registry.k8s.io/pause:3.10.1
    name: pause
    ports:
    - containerPort: 80
      hostPort: {{AddInt 8000 (Mod .Index (DivideInt .podsCount .nodesCount))}}
    resources:
      limits:
        cpu: 40m
        memory: 100Mi
      requests:
        cpu: 40m
        memory: 100Mi