    image: registry.k8s.io/pause:3.10
    livenessProbe:
      httpGet:
        path: /healthz
        port: 9879
      initialDelaySeconds: 30
    name: core-agent
    resources:
      requests:
        cpu: 200m
        memory: 200Mi
    securityContext:
      capabilities:
        add:
        - NET_ADMIN
        - SYS_MODULE
      privileged: true
    volumeMounts:
    - mountPath: /etc/agent/certs
      name: certs-vol
      readOnly: true
    - mountPath: /var/run/agent
      name: run-path
    - mountPath: /host/etc/net.d
      name: net-conf-vol
  - image: registry.k8s.io/pause:3.10
    name: metrics-sidecar
    resources:
      limits:
        cpu: 500m
        memory: 128Mi
      requests:
        cpu: 10m
        memory: 64Mi
    volumeMounts:
    - mountPath: /conf
      name: metrics-conf-vol
  dnsPolicy: ClusterFirst
  hostNetwork: true
  initContainers:
  - command:
    - /bin/setup
    env:
    - name: NODE_NAME
      valueFrom:
        fieldRef:
          fieldPath: spec.nodeName
    image: registry.k8s.io/pause:3.10
    name: init-config-writer
    resources:
      requests:
        cpu: 5m
        memory: 30Mi
    volumeMounts:
    - mountPath: /etc/agent/config
      name: config-vol
  - command:
    - /bin/install
    image: registry.k8s.io/pause:3.10
    name: init-binary-setup
    resources:
      requests:
        cpu: 100m
        memory: 10Mi
    volumeMounts:
    - mountPath: /host/opt/bin
      name: bin-path
  - command:
    - /bin/cleanup
    image: registry.k8s.io/pause:3.10
    name: init-state-cleanup
    resources:
      requests:
        cpu: 100m
        memory: 100Mi
    volumeMounts:
    - mountPath: /var/run/agent
      name: run-path
  nodeSelector:
    disktype: non-existent-ssd
    kubernetes.io/os: linux
  restartPolicy: Always
  schedulerName: non-existent-fuzz-scheduler
  serviceAccountName: network-agent
  volumes:
  - hostPath:
      path: /var/lib/agent/config
      type: DirectoryOrCreate
    name: config-vol
  - hostPath:
      path: /usr/local/bin
      type: Directory
    name: bin-path
  - hostPath:
      path: /var/run/agent
      type: DirectoryOrCreate
    name: run-path
  - hostPath:
      path: /etc/ssl/certs
      type: Directory
    name: certs-vol
  - hostPath:
      path: /etc/cni/net.d
      type: DirectoryOrCreate
    name: net-conf-vol
  - configMap:
      name: agent-metrics-config
    name: metrics-conf-vol
  - hostPath:
      path: /var/lib/agent/v1
      type: DirectoryOrCreate
    name: v-01
  - hostPath:
      path: /var/lib/agent/v2
      type: DirectoryOrCreate
    name: v-02
  - hostPath:
      path: /var/lib/agent/v3
      type: DirectoryOrCreate
    name: v-03
  - hostPath:
      path: /var/lib/agent/v4
      type: DirectoryOrCreate
    name: v-04
  - hostPath:
      path: /var/lib/agent/v5
      type: DirectoryOrCreate
    name: v-05
