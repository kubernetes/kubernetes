name: "complex-daemonset-pod"
envVarCount: 120
managedFieldCount: 20
baseSpec:
  priorityClassName: "system-node-critical"
  serviceAccountName: "network-agent"
  hostNetwork: true
  dnsPolicy: "ClusterFirst"
  restartPolicy: "Always"
  schedulerName: "non-existent-fuzz-scheduler" # Safety
  nodeSelector:
    disktype: "non-existent-ssd" # Safety
    kubernetes.io/os: "linux"
  initContainers:
  - name: "init-config-writer"
    image: "registry.k8s.io/pause:3.10"
    command: ["/bin/setup"]
    env:
    - name: "NODE_NAME"
      valueFrom: { fieldRef: { fieldPath: "spec.nodeName" } }
    resources: { requests: { cpu: "5m", memory: "30Mi" } }
    volumeMounts:
    - mountPath: "/etc/agent/config"
      name: "config-vol"
  - name: "init-binary-setup"
    image: "registry.k8s.io/pause:3.10"
    command: ["/bin/install"]
    resources: { requests: { cpu: "100m", memory: "10Mi" } }
    volumeMounts:
    - mountPath: "/host/opt/bin"
      name: "bin-path"
  - name: "init-state-cleanup"
    image: "registry.k8s.io/pause:3.10"
    command: ["/bin/cleanup"]
    privileged: true
    resources: { requests: { cpu: "100m", memory: "100Mi" } }
    volumeMounts:
    - mountPath: "/var/run/agent"
      name: "run-path"
  containers:
  - name: "core-agent"
    image: "registry.k8s.io/pause:3.10"
    args: ["--config=/etc/agent/config", "--log-level=info"]
    env:
    - name: "AGENT_NAMESPACE"
      valueFrom: { fieldRef: { fieldPath: "metadata.namespace" } }
    - name: "AGENT_CONFIG_MAP"
      value: "/tmp/agent/config"
    resources:
      requests: { cpu: "200m", memory: "200Mi" }
    securityContext:
      privileged: true
      capabilities: { add: ["NET_ADMIN", "SYS_MODULE"] }
    livenessProbe:
      httpGet: { path: "/healthz", port: 9879 }
      initialDelaySeconds: 30
    volumeMounts:
    - mountPath: "/etc/agent/certs"
      name: "certs-vol"
      readOnly: true
    - mountPath: "/var/run/agent"
      name: "run-path"
    - mountPath: "/host/etc/net.d"
      name: "net-conf-vol"
  - name: "metrics-sidecar"
    image: "registry.k8s.io/pause:3.10"
    resources:
      limits: { cpu: "500m", memory: "128Mi" }
      requests: { cpu: "10m", memory: "64Mi" }
    volumeMounts:
    - mountPath: "/conf"
      name: "metrics-conf-vol"
  volumes:
  - name: "config-vol"
    hostPath: { path: "/var/lib/agent/config", type: "DirectoryOrCreate" }
  - name: "bin-path"
    hostPath: { path: "/usr/local/bin", type: "Directory" }
  - name: "run-path"
    hostPath: { path: "/var/run/agent", type: "DirectoryOrCreate" }
  - name: "certs-vol"
    hostPath: { path: "/etc/ssl/certs", type: "Directory" }
  - name: "net-conf-vol"
    hostPath: { path: "/etc/cni/net.d", type: "DirectoryOrCreate" }
  - name: "metrics-conf-vol"
    configMap: { name: "agent-metrics-config" }
  - name: "v-01"
    hostPath: { path: "/var/lib/agent/v1", type: "DirectoryOrCreate" }
  - name: "v-02"
    hostPath: { path: "/var/lib/agent/v2", type: "DirectoryOrCreate" }
  - name: "v-03"
    hostPath: { path: "/var/lib/agent/v3", type: "DirectoryOrCreate" }
  - name: "v-04"
    hostPath: { path: "/var/lib/agent/v4", type: "DirectoryOrCreate" }
  - name: "v-05"
    hostPath: { path: "/var/lib/agent/v5", type: "DirectoryOrCreate" }

managedFields:
- manager: "system-scheduler"
  operation: "Update"
  fieldPathCount: 400
  fieldPathDepth: 5
- manager: "agent-controller-manager"
  operation: "Update"
  fieldPathCount: 800
  fieldPathDepth: 7
- manager: "node-lifecycle-controller"
  operation: "Apply"
  fieldPathCount: 300
  fieldPathDepth: 4

annotations:
- key: "fuzzer.io/arch-complexity-blob"
  length: 15000
- key: "fuzzer.io/sidecar-config-history"
  length: 10000
