apiVersion: v1
kind: Pod
metadata:
  name: complex-daemonset-base
  namespace: default
  annotations:
    fuzzer.io/metadata-bloat: "will-be-fuzzed"
  labels:
    app: representative-agent
  managedFields:
  - manager: "system-controller-manager"
    operation: "Update"
    apiVersion: "v1"
    fieldsV1:
      Raw: '{"f:spec":{"f:containers":{"k:{\"name\":\"core-agent\"}":{".":{},"f:args":{},"f:image":{}}}}}'
spec:
  serviceAccountName: "network-agent"
  hostNetwork: true
  dnsPolicy: "ClusterFirst"
  restartPolicy: "Always"
  schedulerName: "default-scheduler"
  nodeSelector:
    kubernetes.io/os: "linux"
  initContainers:
  - name: "init-config-writer"
    image: "registry.k8s.io/pause:3.10"
    command: ["/bin/setup"]
    env:
    - name: "NODE_NAME"
      valueFrom: { fieldRef: { fieldPath: "spec.nodeName" } }
    resources: { requests: { cpu: "5m", memory: "30Mi" } }
    volumeMounts:
    - mountPath: "/etc/agent/config"
      name: "config-vol"
  containers:
  - name: "core-agent"
    image: "registry.k8s.io/pause:3.10"
    args: ["--config=/etc/agent/config", "--log-level=info"]
    env:
    - name: "AGENT_NAMESPACE"
      valueFrom: { fieldRef: { fieldPath: "metadata.namespace" } }
    resources:
      requests: { cpu: "200m", memory: "200Mi" }
    volumeMounts:
    - mountPath: "/var/run/agent"
      name: "run-path"
  volumes:
  - name: "config-vol"
    hostPath: { path: "/var/lib/agent/config", type: "DirectoryOrCreate" }
  - name: "run-path"
    hostPath: { path: "/var/run/agent", type: "DirectoryOrCreate" }
