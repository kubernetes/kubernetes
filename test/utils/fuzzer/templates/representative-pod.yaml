name: "representative-pod"
baseSpec:
  containers:
  - name: "fuzz-target"
    image: "gcr.io/google-containers/pause:3.9"
  nodeSelector:
    disktype: "non-existent-ssd"
  schedulerName: "non-existent-fuzz-scheduler"
managedFields:
- manager: "kube-scheduler"
  operation: "Update"
  fieldsSchema: "{\"f:status\":{\"f:conditions\":{\".\":{},\"k:{\\\"type\\\":\\\"PodScheduled\\\"}\":{}}}}"
  length: 5000 # Increase to 5KB per entry to mimic large-scale metadata bloat
- manager: "representative-controller"
  operation: "Apply"
  fieldsSchema: "{\"f:metadata\":{\"f:annotations\":{\"f:representative.io/id\":{}}}}"
  length: 5000 # Increase to 5KB per entry to mimic large-scale metadata bloat
annotations:
- key: "fuzz.metadata/large-blob"
  length: 24000
